async function checkListingStatus(url) {

  let result = {
    valid: true,
    sold: false
  };

  try {

    const parsed =
      new URL(url);

    if (!parsed.hostname) {

      result.valid = false;

    }

    if (
      url.includes("undefined") ||
      url.includes("null") ||
      url.length < 15
    ) {

      result.valid = false;

    }

  } catch (e) {

    result.valid = false;

  }

  return result;

}

    // CAPTCHA
    function generateCaptcha() {

      const chars =
        "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

      let result = "";

      for (let i = 0; i < 5; i++) {

        result +=
          chars.charAt(
            Math.floor(
              Math.random() * chars.length
            )
          );

      }

      return result;

    }

      const captcha =

      const input =

    async function isSellerActive(uid) {
    
      try {
    
        const settingsRef =
          doc(
            db,
            "userSettings",
            uid
          );
    
        const snap =
          await getDoc(
            settingsRef
          );
    
        if (!snap.exists()) {
    
          return false;
    
        }
    
        const data =
          snap.data();
    
        if (!data.lastActive) {
    
          return false;
    
        }
    
        const FIVE_DAYS =
          5 * 24 * 60 * 60 * 1000;
    
        const lastActive =
          data.lastActive
            .toDate()
            .getTime();
    
        return (
          Date.now() - lastActive
        ) < FIVE_DAYS;
    
      } catch (e) {
    
        console.error(e);
    
        return false;
    
      }
    
    }

    async function loadListings() {

      try {

        const q =
          query(
            collection(db, "listings"),
            orderBy("createdAt", "desc")
          );

        const snap =
          await getDocs(q);

        // 30 DAYS
        const EXPIRATION_TIME =
          30 * 24 * 60 * 60 * 1000;

        const now =
          Date.now();

        const activeListings = [];

        for (const docSnap of snap.docs) {
        
          const item = {
            id: docSnap.id,
            ...docSnap.data()
          };
        
          // HIDE SOLD LISTINGS
          if (item.sold === true) {
            continue;
          }
        
          // HIDE USERS INACTIVE FOR 5 DAYS
          const sellerActive =
            await isSellerActive(
              item.sellerUid
            );
        
          if (!sellerActive) {
            continue;
          }
        
          // 30 DAY EXPIRY
          if (!item.createdAt) {
            continue;
          }
        
          const createdTime =
            item.createdAt
              .toDate()
              .getTime();
        
          const age =
            now - createdTime;
        
          if (age >= EXPIRATION_TIME) {
            continue;
          }
        
          activeListings.push(item);
        
        }
        
        allListings =
          activeListings;

              const createdTime =
                item.createdAt
                  .toDate()
                  .getTime();

              const age =
                now - createdTime;

              return age < EXPIRATION_TIME;

        const alreadyExists =
          matches.some(
            x => x.id === id
          );

        if (alreadyExists) {
          return;
        }

        matches.push({

          id,

          listingId: item.id,

          title: item.title,

          price: totalPrice,

          link: item.externalLink

        });

        if (
          Notification.permission
          === "granted"
        ) {

          new Notification(
            "Matching Deal Found!",
            {

              body:
                `${item.title} (€${totalPrice})`

            }
          );

        }

      }

    });

  });

  localStorage.setItem(
    "dealMatches",
    JSON.stringify(matches)
  );

  renderMatches();

}
    function renderMatches() {

  matchList.innerHTML = "";

  matchCount.textContent =
    matches.length;

  matches
    .slice()
    .reverse()
    .forEach((match) => {

      const div =
        document.createElement("div");

      div.className =
        "match-item";

      div.innerHTML = `

        <div>

          <a
            href="${match.link}"
            target="_blank"
          >
            ${match.title}
          </a>

          <div>
            €${match.price}
          </div>

        </div>

        <button
          class="remove-match-btn"
          data-id="${match.id}"
        >
          ✕
        </button>

      `;

      matchList.appendChild(div);

    });

  document
    .querySelectorAll(
      ".remove-match-btn"
    )
    .forEach(btn => {

      btn.addEventListener(
        "click",
        () => {

          matches =
            matches.filter(
              x => x.id !== btn.dataset.id
            );

          localStorage.setItem(
            "dealMatches",
            JSON.stringify(matches)
          );

          renderMatches();

        }
      );

    });

}
function cleanupMatches() {

  matches =
    matches.filter(match =>

      allListings.some(
        listing =>
          listing.id ===
          match.listingId
      )

    );

  localStorage.setItem(
    "dealMatches",
    JSON.stringify(matches)
  );

}

    // LOAD
    loadListings();
    renderAlerts();
    renderMatches();

    // MOBILE MENU
    const hamburgerBtn =
      document.getElementById(
        "hamburgerBtn"
      );

    const navMenu =
      document.getElementById(
        "navMenu"
      );

    hamburgerBtn.addEventListener(
      "click",
      ()=> {

        navMenu.classList.toggle(
          "active"
        );

        hamburgerBtn.classList.toggle(
          "active"
        );

      }
    );

  </script>
