<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>User Profile | PCPartDeals</title>

  <link
    rel="stylesheet"
    href="profile-style.css"
  />

  <link rel="preconnect"
        href="https://fonts.googleapis.com">

  <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >

</head>

<body>

  <!-- HEADER -->
  <header class="header">

    <div class="container nav-container">

      <a href="https://pcpartdeals.eu/" class="logo">
        PC<span>PartDeals</span>
      </a>

      <nav class="nav" id="navMenu">

        <a href="https://pcpartdeals.eu/">
          Home
        </a>

        <a href="https://pcpartdeals.eu/browse">
          Browse
        </a>

        <a href="https://pcpartdeals.eu/account">
          Account
        </a>

      </nav>

      <button
        class="hamburger"
        id="hamburgerBtn"
      >

        <span></span>
        <span></span>
        <span></span>

      </button>

    </div>

  </header>

  <!-- PROFILE HERO -->
  <section class="profile-hero">

    <div class="container">

      <div class="profile-box">

        <div class="profile-avatar"
             id="profileAvatar">
          U
        </div>

        <div class="profile-info">

          <div class="tag">
            PCPartDeals Seller
          </div>

          <!-- UPDATED USERNAME ROW -->
          <div class="username-row">

            <h1 id="profileUsername">
              Loading...
            </h1>

            <span
              id="verifiedBadge"
              class="verified-badge hidden"
            >
              ✔ Verified
            </span>

          </div>

          <p id="profileBio">
            User marketplace profile
          </p>

          <div class="profile-stats">

            <div class="stat-card">

              <h3 id="listingCount">
                0
              </h3>

              <p>
                Active Listings
              </p>

            </div>

            <div class="stat-card">

              <h3 id="joinedDate">
                —
              </h3>

              <p>
                Joined
              </p>

            </div>

          </div>

        </div>

      </div>

    </div>

  </section>

  <!-- FILTERS -->
  <section class="filters">

    <div class="container">

      <div class="filter-grid">

        <input
          type="text"
          id="searchInput"
          placeholder="Search listings"
        />

        <select id="productFilter">

          <option value="">
            All Products
          </option>

        </select>

        <select id="sortPrice">

          <option value="">
            Sort by price
          </option>

          <option value="asc">
            Lowest first
          </option>

          <option value="desc">
            Highest first
          </option>

        </select>

      </div>

    </div>

  </section>

  <!-- LISTINGS -->
  <section class="listings">

    <div class="container">

      <div
        class="listing-grid"
        id="listingGrid"
      >

        <div class="loading">
          Loading profile...
        </div>

      </div>

    </div>

  </section>

  <!-- FIREBASE -->
  <script type="module">

    import { initializeApp }
    from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

    import {
      getFirestore,
      collection,
      getDocs,
      query,
      where
    }
    from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB9SrAC073Fhn3Z_2vZpqlX25HLIGFuB9A",
      authDomain: "pcpartdealseu.firebaseapp.com",
      projectId: "pcpartdealseu",
      storageBucket: "pcpartdealseu.firebasestorage.app",
      messagingSenderId: "912036519057",
      appId: "1:912036519057:web:cde4d266c53c2229ad3330",
      measurementId: "G-FPQ8YQ9EM0"
    };

    const app =
      initializeApp(firebaseConfig);

    const db =
      getFirestore(app);

    // URL FORMAT:
    // /profile.html?user=username

    const params =
      new URLSearchParams(
        window.location.search
      );

    const username =
      params.get("user");

    const listingGrid =
      document.getElementById(
        "listingGrid"
      );

    const profileUsername =
      document.getElementById(
        "profileUsername"
      );

    const profileAvatar =
      document.getElementById(
        "profileAvatar"
      );

    const listingCount =
      document.getElementById(
        "listingCount"
      );

    const joinedDate =
      document.getElementById(
        "joinedDate"
      );

    const productFilter =
      document.getElementById(
        "productFilter"
      );

    const searchInput =
      document.getElementById(
        "searchInput"
      );

    const sortPrice =
      document.getElementById(
        "sortPrice"
      );

    // VERIFIED BADGE
    const verifiedBadge =
      document.getElementById(
        "verifiedBadge"
      );

    let allListings = [];

    // ESCAPE
    function escapeHtml(text) {

      const div =
        document.createElement("div");

      div.textContent = text;

      return div.innerHTML;

    }

    // RENDER
    function renderListings(data) {

      if (!data.length) {

        listingGrid.innerHTML = `
          <div class="loading">
            No listings found.
          </div>
        `;

        return;
      }

      listingGrid.innerHTML = "";

      data.forEach(item => {

        const card =
          document.createElement("div");

        card.className =
          "listing-card";

        card.innerHTML = `

          <img
            src="${item.imageUrl}"
            alt="${escapeHtml(item.title)}"
            loading="lazy"
          >

          <div class="listing-content">

            <div class="listing-top">

              <span class="marketplace">
                ${escapeHtml(item.marketplace || "Marketplace")}
              </span>

              <span class="condition">
                ${escapeHtml(item.condition || "Used")}
              </span>

            </div>

            <h3>
              ${escapeHtml(item.title)}
            </h3>

            <p class="price">
              €${item.price}
            </p>

            <p class="shipping">
              Shipping:
              €${item.shippingPrice || 0}
            </p>

            <a
              href="${item.externalLink}"
              target="_blank"
              rel="noopener noreferrer"
              class="view-btn"
            >
              View Listing
            </a>

          </div>

        `;

        listingGrid.appendChild(card);

      });

    }

    // FILTERS
    function applyFilters() {

      let filtered =
        [...allListings];

      const search =
        searchInput.value
          .toLowerCase();

      const product =
        productFilter.value;

      const sort =
        sortPrice.value;

      if (search) {

        filtered =
          filtered.filter(x =>
            x.title
              .toLowerCase()
              .includes(search)
          );

      }

      if (product) {

        filtered =
          filtered.filter(x =>
            x.productType === product
          );

      }

      if (sort === "asc") {

        filtered.sort(
          (a,b)=>
            a.price - b.price
        );

      }

      if (sort === "desc") {

        filtered.sort(
          (a,b)=>
            b.price - a.price
        );

      }

      renderListings(filtered);

    }

    // LOAD PROFILE
    async function loadProfile() {

      try {

        if (!username) {

          listingGrid.innerHTML = `
            <div class="loading">
              Invalid profile.
            </div>
          `;

          return;
        }

        profileUsername.textContent =
          username;

        profileAvatar.textContent =
          username.charAt(0)
            .toUpperCase();

        // USER SETTINGS
        const usersQuery =
          query(
            collection(db, "userSettings"),
            where("username", "==", username)
          );

        const userSnap =
          await getDocs(usersQuery);

        if (userSnap.empty) {

          listingGrid.innerHTML = `
            <div class="loading">
              User not found.
            </div>
          `;

          return;
        }

        const userData =
          userSnap.docs[0].data();

        const uid =
          userSnap.docs[0].id;

        // VERIFIED SELLER BADGE
        if (userData.verifiedSeller === true) {

          verifiedBadge.classList.remove(
            "hidden"
          );

        }

        // BIO
        if (userData.bio) {

          document.getElementById(
            "profileBio"
          ).textContent =
            userData.bio;

        }

        // JOIN DATE
        if (userData.createdAt?.seconds) {

          const date =
            new Date(
              userData.createdAt.seconds * 1000
            );

          joinedDate.textContent =
            date.getFullYear();

        }

        // LISTINGS
        const listingQuery =
          query(
            collection(db, "listings"),
            where("sellerUid", "==", uid)
          );

        const listingSnap =
          await getDocs(listingQuery);

        allListings =
          listingSnap.docs.map(doc => ({
            id: doc.id,
            ...doc.data()
          }));

        listingCount.textContent =
          allListings.length;

        // PRODUCT FILTERS
        const uniqueProducts =
          [
            ...new Set(
              allListings.map(
                x => x.productType
              )
            )
          ];

        uniqueProducts.forEach(product => {

          if (!product) return;

          const option =
            document.createElement("option");

          option.value =
            product;

          option.textContent =
            product;

          productFilter.appendChild(option);

        });

        renderListings(allListings);

      } catch (e) {

        console.error(e);

        listingGrid.innerHTML = `
          <div class="loading">
            Failed loading profile.
          </div>
        `;

      }

    }

    searchInput.addEventListener(
      "input",
      applyFilters
    );

    productFilter.addEventListener(
      "change",
      applyFilters
    );

    sortPrice.addEventListener(
      "change",
      applyFilters
    );

    loadProfile();

    // MOBILE MENU
    const hamburgerBtn =
      document.getElementById(
        "hamburgerBtn"
      );

    const navMenu =
      document.getElementById(
        "navMenu"
      );

    hamburgerBtn.addEventListener(
      "click",
      ()=> {

        navMenu.classList.toggle(
          "active"
        );

        hamburgerBtn.classList.toggle(
          "active"
        );

      }
    );

  </script>

</body>
</html>
